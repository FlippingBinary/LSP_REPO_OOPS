[tools]
gradle = "latest"
java = "latest"

[tasks.build]
run = "gradle build"
sources = ["src/**/*.java"]
outputs = ["build/**/*.class"]

[tasks.test]
run = "gradle test --rerun"

[tasks.1]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.assignment1.HelloWorld'

[tasks.2]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.assignment2.ETLPipeline'

[tasks.3]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.assignment3.ETLPipeline'

[tasks.midterm-crccards]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.midterm.crccards.Driver'

[tasks.midterm-strategy]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.midterm.strategy.Driver'

[tasks.5]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.assignment5.Driver'

[tasks.6]
depends = ["build"]
run = 'gradle test --rerun --tests "org.howard.edu.lsp.assignment6.IntegerSetTest"'

[tasks.finalexam-q2]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.finalexam.question2.Driver'

[tasks.finalexam-q3]
depends = ["build"]
run = 'gradle test --rerun --tests "org.howard.edu.lsp.finalexam.question3.GradeCalculatorTest"'

[tasks.javadoc]
run = "gradle javadoc"
