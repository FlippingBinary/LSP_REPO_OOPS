[tools]
gradle = "latest"
java = "latest"

[tasks.build]
run = "gradle build"
sources = ["src/**/*.java"]
outputs = ["build/**/*.class"]

[tasks.test]
run = "gradle test --rerun"

[tasks.1]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.assignment1.HelloWorld'

[tasks.2]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.assignment2.ETLPipeline'

[tasks.3]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.assignment3.ETLPipeline'

[tasks.midterm-crccards]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.midterm.crccards.Driver'

[tasks.midterm-strategy]
depends = ["build"]
run = 'java -cp "$MISE_PROJECT_ROOT"/build/classes/java/main org.howard.edu.lsp.midterm.strategy.Driver'
